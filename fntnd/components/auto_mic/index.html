<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://unpkg.com/streamlit-component-lib@2.0.0/dist/streamlit-component-lib.js"></script>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
    }
    .mic-panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #312e81;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .mic-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.2s infinite;
      flex-shrink: 0;
    }
    .mic-idle { background: #94a3b8; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }
  </style>
</head>
<body>
  <div class="mic-panel">
    <div id="mic-dot" class="mic-dot mic-idle"></div>
    <div id="mic-status">Microphone standby</div>
  </div>
  <script>
    const Streamlit = window.Streamlit;
    const statusEl = document.getElementById("mic-status");
    const dotEl = document.getElementById("mic-dot");

    let mediaStream = null;
    let mediaRecorder = null;
    let audioContext = null;
    let analyser = null;
    let monitorTimer = null;
    let chunks = [];
    let hasSpoken = false;
    let silenceMs = 0;
    let openMs = 0;
    let activeSession = 0;
    let lastAutoStartKey = "";
    let messageListenerAttached = false;

    const SILENCE_THRESHOLD = 0.018;
    const CHECK_INTERVAL_MS = 200;

    function setStatus(text, live) {
      statusEl.textContent = text;
      dotEl.classList.toggle("mic-idle", !live);
    }

    function cleanup() {
      if (monitorTimer) {
        clearInterval(monitorTimer);
        monitorTimer = null;
      }
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        try { mediaRecorder.stop(); } catch (e) {}
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
        mediaStream = null;
      }
      if (audioContext) {
        try { audioContext.close(); } catch (e) {}
        audioContext = null;
      }
      mediaRecorder = null;
      analyser = null;
      chunks = [];
      hasSpoken = false;
      silenceMs = 0;
      openMs = 0;
    }

    function finishRecording(sessionId) {
      if (sessionId !== activeSession) return;
      if (!mediaRecorder || mediaRecorder.state === "inactive") return;
      setStatus("Processing your answer…", false);
      try { mediaRecorder.stop(); } catch (e) {}
    }

    function submitEmptyAnswer() {
      cleanup();
      setStatus("No speech detected — moving on", false);
      Streamlit.setComponentValue({ empty: true });
    }

    function monitorSilence(sessionId, silenceLimitMs) {
      monitorTimer = setInterval(() => {
        if (sessionId !== activeSession || !analyser) return;
        const data = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i += 1) {
          const v = (data[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / data.length);

        if (rms > SILENCE_THRESHOLD) {
          hasSpoken = true;
          silenceMs = 0;
          openMs = 0;
          setStatus("Listening… speak your answer", true);
          return;
        }

        if (!hasSpoken) {
          openMs += CHECK_INTERVAL_MS;
          const remaining = Math.max(0, Math.ceil((silenceLimitMs - openMs) / 1000));
          setStatus(`Listening… speak now (${remaining}s until next question)`, true);
          if (openMs >= silenceLimitMs) {
            clearInterval(monitorTimer);
            monitorTimer = null;
            submitEmptyAnswer();
          }
          return;
        }

        silenceMs += CHECK_INTERVAL_MS;
        const remaining = Math.max(0, Math.ceil((silenceLimitMs - silenceMs) / 1000));
        setStatus(`Listening… auto-continue in ${remaining}s if you stay quiet`, true);
        if (silenceMs >= silenceLimitMs) {
          finishRecording(sessionId);
        }
      }, CHECK_INTERVAL_MS);
    }

    async function startRecording(sessionId, silenceLimitMs) {
      if (mediaRecorder && mediaRecorder.state === "recording") return;
      cleanup();
      activeSession = sessionId;
      chunks = [];
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        setStatus("Microphone access is required for the interview.", false);
        Streamlit.setComponentValue({ error: "mic_denied" });
        return;
      }

      audioContext = new AudioContext();
      const source = audioContext.createMediaStreamSource(mediaStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);

      const mimeType = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
        ? "audio/webm;codecs=opus"
        : "audio/webm";
      mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
      mediaRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) chunks.push(event.data);
      };
      mediaRecorder.onstop = () => {
        if (sessionId !== activeSession) return;
        if (!chunks.length) {
          submitEmptyAnswer();
          return;
        }
        const blob = new Blob(chunks, { type: mimeType });
        const reader = new FileReader();
        reader.onloadend = () => {
          Streamlit.setComponentValue({
            audio: reader.result,
            mime: mimeType,
          });
          cleanup();
          setStatus("Answer captured", false);
        };
        reader.readAsDataURL(blob);
      };

      mediaRecorder.start(250);
      setStatus("Listening… speak your answer", true);
      monitorSilence(sessionId, silenceLimitMs);
    }

    function attachMessageListener() {
      if (messageListenerAttached) return;
      messageListenerAttached = true;
      window.parent.addEventListener("message", (event) => {
        const data = event.data || {};
        if (data.type === "interviewlab_start_mic") {
          const silenceLimitMs = Math.max(3000, Number(data.silenceSeconds || 15) * 1000);
          startRecording(Date.now(), silenceLimitMs);
        }
      });
    }

    function onRender(event) {
      const args = event.detail.args || {};
      const autoStart = !!args.auto_start;
      const stopNow = !!args.stop_now;
      const silenceSeconds = Number(args.silence_seconds || 15);
      const silenceLimitMs = Math.max(3000, silenceSeconds * 1000);
      const autoStartKey = `${autoStart}|${stopNow}|${silenceSeconds}`;

      attachMessageListener();
      Streamlit.setFrameHeight(56);

      if (stopNow) {
        finishRecording(activeSession);
        return;
      }

      if (autoStart && autoStartKey !== lastAutoStartKey) {
        lastAutoStartKey = autoStartKey;
        startRecording(Date.now(), silenceLimitMs);
        return;
      }

      if (!mediaRecorder || mediaRecorder.state === "inactive") {
        setStatus("Microphone ready — waiting for your turn", false);
      }
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    attachMessageListener();
    Streamlit.setFrameHeight(56);
  </script>
</body>
</html>
