<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: transparent;
    }
    .panel {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid #c7d2fe;
      background: #eef2ff;
      color: #312e81;
      font-size: 0.92rem;
      font-weight: 600;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }
    .dot.live {
      background: #22c55e;
      animation: pulse 1.2s infinite;
    }
    .dot.speaking {
      background: #6366f1;
      animation: pulse 0.9s infinite;
    }
    .dot.error { background: #ef4444; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(0.85); }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div id="dot" class="dot"></div>
    <div id="status">Connecting live interview…</div>
  </div>
  <script>
    (function () {
      const RENDER = "streamlit:render";
      const COMPONENT_READY = "streamlit:componentReady";
      const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";
      const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
      const API_VERSION = 1;
      const listeners = {};
      let registeredMessageListener = false;

      function addEventListener(type, callback) {
        if (!listeners[type]) listeners[type] = [];
        listeners[type].push(callback);
      }
      function dispatchEvent(type, event) {
        (listeners[type] || []).forEach((cb) => cb(event));
      }
      function sendBackMsg(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type: type }, data),
          "*"
        );
      }
      window.Streamlit = {
        RENDER_EVENT: RENDER,
        events: { addEventListener: addEventListener, dispatchEvent: dispatchEvent },
        setComponentReady: function () {
          if (!registeredMessageListener) {
            window.addEventListener("message", function (event) {
              const data = event.data;
              if (!data || data.type !== RENDER) return;
              dispatchEvent(RENDER, {
                detail: {
                  disabled: Boolean(data.disabled),
                  args: data.args || {},
                  theme: data.theme,
                },
              });
            });
            registeredMessageListener = true;
          }
          sendBackMsg(COMPONENT_READY, { apiVersion: API_VERSION });
        },
        setFrameHeight: function (height) {
          if (height === undefined) height = document.body.scrollHeight;
          sendBackMsg(SET_FRAME_HEIGHT, { height: height });
        },
        setComponentValue: function (value) {
          sendBackMsg(SET_COMPONENT_VALUE, { value: value, dataType: "json" });
        },
      };
    })();

    const Streamlit = window.Streamlit;
    const statusEl = document.getElementById("status");
    const dotEl = document.getElementById("dot");

    let pc = null;
    let dc = null;
    let localStream = null;
    let remoteAudio = null;
    let startedSessionId = null;
    let disconnectRequested = false;
    let assistantBuffer = "";
    let userBuffer = "";
    let transcript = [];
    let activeSpeaker = "none";
    let lastEmitKey = "";

    function setStatus(text, mode) {
      statusEl.textContent = text;
      dotEl.className = "dot" + (mode ? " " + mode : "");
    }

    function emit(extra) {
      const payload = Object.assign(
        {
          type: "realtime_update",
          transcript: transcript.slice(),
          active_speaker: activeSpeaker,
          caption: {
            speaker: activeSpeaker === "you" ? "you" : "interviewer",
            text:
              activeSpeaker === "you"
                ? userBuffer
                : assistantBuffer ||
                  (transcript.length
                    ? transcript[transcript.length - 1].content
                    : ""),
          },
          connected: !!(pc && pc.connectionState !== "closed"),
        },
        extra || {}
      );
      const key = JSON.stringify(payload);
      if (key === lastEmitKey) return;
      lastEmitKey = key;
      Streamlit.setComponentValue(payload);
    }

    function pushTurn(role, content) {
      const text = (content || "").trim();
      if (!text) return;
      const last = transcript[transcript.length - 1];
      if (last && last.role === role && last.content === text) return;
      transcript.push({ role: role, content: text });
      emit();
    }

    async function cleanup() {
      try {
        if (dc) dc.close();
      } catch (e) {}
      dc = null;
      if (pc) {
        try {
          pc.getSenders().forEach((s) => {
            try {
              if (s.track) s.track.stop();
            } catch (e) {}
          });
          pc.close();
        } catch (e) {}
      }
      pc = null;
      if (localStream) {
        localStream.getTracks().forEach((t) => t.stop());
        localStream = null;
      }
      if (remoteAudio) {
        try {
          remoteAudio.pause();
          remoteAudio.srcObject = null;
        } catch (e) {}
        remoteAudio = null;
      }
    }

    function handleServerEvent(event) {
      const type = event.type || "";

      if (type === "session.created" || type === "session.updated") {
        setStatus("Live — speak naturally with your interviewer", "live");
        activeSpeaker = "interviewer";
        emit({ status: "session_ready" });
        return;
      }

      if (type === "input_audio_buffer.speech_started") {
        activeSpeaker = "you";
        userBuffer = "";
        setStatus("Listening to you…", "live");
        emit();
        return;
      }

      if (type === "input_audio_buffer.speech_stopped") {
        setStatus("Interviewer is thinking…", "speaking");
        emit();
        return;
      }

      if (
        type === "conversation.item.input_audio_transcription.delta" ||
        type === "conversation.item.input_audio_transcription.delta.v2"
      ) {
        userBuffer += event.delta || "";
        activeSpeaker = "you";
        emit();
        return;
      }

      if (
        type === "conversation.item.input_audio_transcription.completed" ||
        type === "conversation.item.input_audio_transcription.completed.v2"
      ) {
        const text = event.transcript || userBuffer;
        pushTurn("user", text);
        userBuffer = "";
        return;
      }

      if (
        type === "response.output_audio_transcript.delta" ||
        type === "response.audio_transcript.delta"
      ) {
        assistantBuffer += event.delta || "";
        activeSpeaker = "interviewer";
        setStatus("Interviewer speaking…", "speaking");
        emit();
        return;
      }

      if (
        type === "response.output_audio_transcript.done" ||
        type === "response.audio_transcript.done"
      ) {
        const text = event.transcript || assistantBuffer;
        pushTurn("assistant", text);
        assistantBuffer = "";
        activeSpeaker = "interviewer";
        setStatus("Your turn — speak when ready", "live");
        emit();
        return;
      }

      if (type === "response.done") {
        if (assistantBuffer.trim()) {
          pushTurn("assistant", assistantBuffer);
          assistantBuffer = "";
        }
        const lower = (transcript.length ? transcript[transcript.length - 1].content : "").toLowerCase();
        if (
          lower.includes("interview has concluded") ||
          lower.includes("that concludes") ||
          lower.includes("thank you for your time")
        ) {
          emit({ type: "interview_complete", transcript: transcript.slice() });
        }
        return;
      }

      if (type === "error") {
        const msg =
          (event.error && (event.error.message || event.error.code)) ||
          "Realtime session error";
        setStatus(String(msg), "error");
        emit({ type: "error", error: String(msg) });
      }
    }

    async function startSession(ephemeralKey, sessionId) {
      if (!ephemeralKey) {
        setStatus("Missing live session key.", "error");
        emit({ type: "error", error: "missing_ephemeral_key" });
        return;
      }
      if (startedSessionId === sessionId && pc) return;

      await cleanup();
      startedSessionId = sessionId;
      disconnectRequested = false;
      transcript = [];
      assistantBuffer = "";
      userBuffer = "";
      activeSpeaker = "interviewer";
      setStatus("Connecting microphone…", "");

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        setStatus("Microphone access is required for the interview.", "error");
        emit({ type: "error", error: "mic_denied" });
        return;
      }

      pc = new RTCPeerConnection();
      remoteAudio = document.createElement("audio");
      remoteAudio.autoplay = true;
      remoteAudio.playsInline = true;
      document.body.appendChild(remoteAudio);
      pc.ontrack = (e) => {
        remoteAudio.srcObject = e.streams[0];
        remoteAudio.play().catch(function () {});
      };
      localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

      dc = pc.createDataChannel("oai-events");
      dc.addEventListener("open", function () {
        setStatus("Connected — interview starting…", "live");
        // Ask the model to begin with the welcome + first question.
        try {
          dc.send(
            JSON.stringify({
              type: "response.create",
            })
          );
        } catch (e) {}
        emit({ status: "connected" });
      });
      dc.addEventListener("message", function (e) {
        try {
          handleServerEvent(JSON.parse(e.data));
        } catch (err) {}
      });

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      const sdpResponse = await fetch("https://api.openai.com/v1/realtime/calls", {
        method: "POST",
        body: offer.sdp,
        headers: {
          Authorization: "Bearer " + ephemeralKey,
          "Content-Type": "application/sdp",
        },
      });

      if (!sdpResponse.ok) {
        const detail = await sdpResponse.text();
        setStatus("Could not start live interview session.", "error");
        emit({
          type: "error",
          error: "sdp_failed",
          detail: detail.slice(0, 300),
        });
        await cleanup();
        return;
      }

      const answer = { type: "answer", sdp: await sdpResponse.text() };
      await pc.setRemoteDescription(answer);
      setStatus("Live — speak naturally with your interviewer", "live");
      emit({ status: "webrtc_ready" });
    }

    async function stopSession(reason) {
      disconnectRequested = true;
      if (assistantBuffer.trim()) pushTurn("assistant", assistantBuffer);
      if (userBuffer.trim()) pushTurn("user", userBuffer);
      await cleanup();
      startedSessionId = null;
      setStatus("Interview session ended", "");
      emit({
        type: reason === "complete" ? "interview_complete" : "disconnected",
        transcript: transcript.slice(),
      });
    }

    function onRender(event) {
      const args = (event.detail && event.detail.args) || {};
      const ephemeralKey = args.ephemeral_key || "";
      const sessionId = Number(args.session_id || 0);
      const disconnect = !!args.disconnect;

      Streamlit.setFrameHeight(56);

      if (disconnect) {
        stopSession("end");
        return;
      }

      if (ephemeralKey && sessionId && startedSessionId !== sessionId) {
        startSession(ephemeralKey, sessionId);
      }
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(56);
  </script>
</body>
</html>
